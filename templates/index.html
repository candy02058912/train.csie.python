<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candy 的 Python 課程資源</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;

            --exercise-bg: #4c1d95;
            --exercise-accent: #c084fc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        h2.section-title {
            font-size: 1.8rem;
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            color: var(--accent);
            text-align: center;
            width: 100%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.5rem;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out backwards;
            border: 1px solid transparent;
        }

        .card.exercise-card {
            background-color: var(--exercise-bg);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, transparent, rgba(56, 189, 248, 0.1));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card.exercise-card::before {
            background: linear-gradient(135deg, transparent, rgba(192, 132, 252, 0.2));
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
            border-color: var(--accent);
        }

        .card.exercise-card:hover {
            border-color: var(--exercise-accent);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:hover h2 {
            color: var(--accent-hover);
        }

        .card.exercise-card:hover h2 {
            color: var(--exercise-accent);
        }

        .card h2 {
            font-size: 1.25rem;
            margin: 0;
            z-index: 1;
            transition: color 0.3s ease;
            word-break: break-all;
            text-align: center;
        }

        .icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            z-index: 1;
            transition: transform 0.3s ease;
        }

        .card:hover .icon {
            transform: scale(1.1) rotate(5deg);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <h1>🚀 Candy 的 Python 課程資源</h1>

    <h2 class="section-title">🔍 查詢練習繳交紀錄</h2>
    <div class="card exercise-card"
        style="max-width: 600px; width: 100%; margin: 0 auto; animation-delay: 0.2s; padding: 2rem;">

        <div style="width: 100%; display: flex; flex-direction: column; gap: 1.2rem; position: relative; z-index: 2;">
            <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 200px;">
                    <label
                        style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--exercise-accent); font-weight: bold;">學號</label>
                    <input type="text" id="stuID" placeholder="不知道的來問我：）"
                        style="box-sizing: border-box; width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(15, 23, 42, 0.6); color: white; outline: none; transition: 0.3s; font-family: inherit;">
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <label
                        style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--exercise-accent); font-weight: bold;">姓名</label>
                    <input type="text" id="stuName" placeholder="請輸入姓名"
                        style="box-sizing: border-box; width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(15, 23, 42, 0.6); color: white; outline: none; transition: 0.3s; font-family: inherit;">
                </div>
            </div>
            <button onclick="checkData()"
                style="box-sizing: border-box; width: 100%; padding: 1rem; border-radius: 8px; border: none; background: var(--accent); color: var(--bg-color); font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; font-family: inherit;">
                🚀 開始查詢
            </button>
        </div>

        <div id="loader"
            style="display: none; margin-top: 1.5rem; text-align: center; color: var(--accent); font-weight: bold; position: relative; z-index: 2;">
            📡 正在連線至資料庫...
        </div>

        <div id="results"
            style="display: none; width: 100%; margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1.5rem; position: relative; z-index: 2;">
            <h3 style="font-size: 1.1rem; color: var(--exercise-accent); margin-bottom: 1rem;">
                尚未完成： <span id="count" style="color: var(--accent); font-size: 1.3rem;">{{ exercises|length }}</span>
                題
            </h3>
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; font-size: 0.95rem;">
                    <thead>
                        <tr style="text-align: left; border-bottom: 2px solid var(--accent);">
                            <th style="padding: 0.8rem; width: 20%; text-align: center;">題號</th>
                            <th style="padding: 0.8rem; width: 15%; text-align: center;">比重</th>
                            <th style="padding: 0.8rem; width: 25%;">狀態</th>
                            <th style="padding: 0.8rem; width: 40%;">最後繳交時間</th>
                        </tr>
                    </thead>
                    <tbody id="resBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script id="exercises-data" type="application/json">
        {{ exercises_json|safe }}
    </script>
    <script>
        async function checkData() {
            const id = document.getElementById('stuID').value.trim();
            const name = document.getElementById('stuName').value.trim();
            const loader = document.getElementById('loader');
            const results = document.getElementById('results');
            const resBody = document.getElementById('resBody');

            if (!id || !name) return alert("請輸入學號與姓名！");

            loader.style.display = "block";
            results.style.display = "none";

            const webAppUrl = `https://script.google.com/macros/s/AKfycbx2VTtDp_dbuFycMuxaUyNdp-5feoc1A06enFlsfwndMNClQS0DKf3SJzmg0gqS2Ks3wQ/exec?action=check&stuID=${id}&stuName=${encodeURIComponent(name)}`;

            try {
                const response = await fetch(webAppUrl, {
                    method: 'GET',
                    redirect: 'follow'
                });
                const data = await response.json();

                loader.style.display = "none";
                resBody.innerHTML = "";

                if (data.status === "success" && data.submissions) {
                    if (data.submissions.length === 0) {
                        alert("找不到資料，請確認學號與姓名是否正確輸入，或是找 Candy 確認！");
                        return;
                    }

                    const exercisesMap = {};
                    data.submissions.forEach(row => {
                        const rawExNum = row["題號"].toString().trim();
                        if (!rawExNum) return;
                        // 數字開頭的題號去掉前導零，非數字的直接用原始值
                        const numMatch = rawExNum.match(/^(\d+)(.*)$/);
                        const exNum = numMatch ? parseInt(numMatch[1]).toString() + numMatch[2] : rawExNum;
                        // 轉換時間格式，例如：2026/03/10 19:44:41
                        const timeStr = new Date(row["時間戳記"]).toLocaleString('zh-TW', { hour12: false });

                        // 如果同一題已經有紀錄，比較哪一個時間比較近
                        if (!exercisesMap[exNum] || new Date(row["時間戳記"]) > new Date(exercisesMap[exNum].rawTime)) {
                            exercisesMap[exNum] = {
                                formattedTime: timeStr,
                                rawTime: row["時間戳記"]
                            };
                        }
                    });

                    const exerciseDataJSON = document.getElementById('exercises-data').textContent;
                    const exerciseData = JSON.parse(exerciseDataJSON);
                    const exerciseIds = Object.keys(exerciseData).sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
                    const totalExercises = exerciseIds.length;
                    let completedCount = 0;

                    exerciseIds.forEach((id, idx) => {
                        let statusHtml = "";
                        let timeHtml = "";

                        if (exercisesMap[id]) {
                            completedCount++;
                            statusHtml = `<span style="color: #4ade80; font-weight: bold;">✅ 已繳交</span>`;
                            timeHtml = `<span style="color: var(--accent);">${exercisesMap[id].formattedTime}</span>`;
                        } else {
                            statusHtml = `<span style="color: #94a3b8;">❌ 未繳交</span>`;
                            timeHtml = `<span style="color: #64748b;">沒有紀錄</span>`;
                        }

                        const linkMap = {
                            "typing_game": "typing_game.py"
                        };
                        const targetUrl = linkMap[id] || `exercise_${id}.html`;

                        // 組合 HTML，偶數行加一點點底色幫助閱讀
                        const tr = `<tr style="border-bottom: 1px solid rgba(255,255,255,0.05); background: ${idx % 2 === 0 ? 'rgba(255,255,255,0.02)' : 'transparent'};">
                  <td style="padding: 0.8rem; text-align: center; font-weight: bold;">
                    <a href="${targetUrl}" target="_blank" style="color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent); padding-bottom: 2px; transition: opacity 0.2s;" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1">${id}</a>
                  </td>
                  <td style="padding: 0.8rem; text-align: center;">${exerciseData[id].score}%</td>
                  <td style="padding: 0.8rem;">${statusHtml}</td>
                  <td style="padding: 0.8rem;">${timeHtml}</td>
                </tr>`;
                        resBody.innerHTML += tr;
                    });

                    // 更新完成進度
                    const incompleteCount = totalExercises - completedCount;
                    document.getElementById('count').innerText = incompleteCount;
                    results.style.display = "block";

                } else {
                    alert("查無此人，或是該生目前沒有任何繳交紀錄！");
                }
            } catch (err) {
                loader.style.display = "none";
                alert("連線發生錯誤，請稍後再試或檢查網路連線。");
                console.error(err);
            }
        }
    </script>

    <h2 class="section-title">✨ 練習題 ✨</h2>
    <div class="container">
        {% for ex in exercises %}
        <a href="exercise_{{ ex.id }}.html" class="card exercise-card"
            style="animation-delay: {{ loop.index0 * 0.1 }}s">
            <div class="icon">💻</div>
            <h2>{{ ex.title }}</h2>
        </a>
        {% endfor %}
    </div>

    <h2 class="section-title">🐍 範例程式</h2>
    <div class="container">
        {% for script in scripts %}
        {% if '_checker' not in script %}
        <a href="{{ script }}" class="card" style="animation-delay: {{ (loop.index0 + exercises|length) * 0.1 }}s">
            <div class="icon">📝</div>
            <h2>{{ script }}</h2>
        </a>
        {% endif %}
        {% endfor %}
    </div>
</body>

</html>
