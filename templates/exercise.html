<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python 學習進度繳交 - {{ ex.title }}</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.20/codemirror.min.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.20/theme/pastel-on-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.20/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.20/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.20/addon/comment/comment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.20/addon/selection/active-line.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.20/keymap/sublime.min.js"></script>


    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: white;
            --text-color: #333;
            --quest-bg: #e8f4fd;
            --quest-border: #3498db;
            --btn-bg: #27ae60;
            --result-output-bg: #fdfdfd;
            --pass-bg: #d4edda;
            --pass-border: #c3e6cb;
            --pass-text: #155724;
            --fail-bg: #f8d7da;
            --fail-border: #f5c6cb;
            --fail-text: #721c24;
        }

        body.dark-mode {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --quest-bg: #37474f;
            --quest-border: #4db6ac;
            --btn-bg: #2ecc71;
            --result-output-bg: #333;
            --pass-bg: #1e4620;
            --pass-border: #2e7d32;
            --pass-text: #a5d6a7;
            --fail-bg: #4c1d1d;
            --fail-border: #b71c1c;
            --fail-text: #ef9a9a;
        }

        body {
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
            max-width: 1600px;
            width: 95%;
            margin: 20px auto;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        /* Responsive 2-Column Layout */
        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: grid;
            grid-template-columns: 1fr 1.8fr;
            gap: 30px;
            align-items: start;
            min-height: calc(100vh - 40px);
            box-sizing: border-box;
            transition: background-color 0.3s;
        }

        @media (max-width: 850px) {
            .card {
                grid-template-columns: 1fr;
            }

            body {
                margin: 20px;
            }
        }

        .quest-panel,
        .code-panel {
            min-width: 0;
        }

        .quest-panel h1 {
            margin-top: 0;
            font-size: 24px;
        }

        .quest {
            background: var(--quest-bg);
            padding: 15px;
            border-left: 5px solid var(--quest-border);
            margin-bottom: 20px;
            font-size: 17px;
            line-height: 1.6;
            transition: background-color 0.3s;
        }

        /* Embed Mode Adjustments */
        body.embed-mode {
            margin: 0 !important;
            width: 100% !important;
            max-width: 100% !important;
            background: var(--bg-color);
            overflow: hidden;
            /* Prevent outer scrollbar */
            height: 100vh;
        }

        body.embed-mode .back-link,
        body.embed-mode .quest-panel h1 {
            display: none;
        }

        body.embed-mode .card {
            box-shadow: none;
            border-radius: 0;
            padding: 10px;
            padding-bottom: 60px;
            /* Extra space to prevent getting stuck at bottom */
            gap: 15px;
            height: 100vh;
            overflow-y: auto;
            grid-template-columns: 1fr 1.2fr;
            box-sizing: border-box;
        }

        body.embed-mode .quest {
            font-size: 14px;
            padding: 10px;
        }

        body.embed-mode .CodeMirror {
            height: 240px !important;
            /* Shorter for embed */
            font-size: 16px;
            /* Slightly smaller for embed */
        }

        body.embed-mode .CodeMirror-gutters {
            left: 0 !important;
        }

        body.embed-mode button {
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }

        .CodeMirror {
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 18px;
            height: calc(100vh - 250px);
            min-height: 400px;
            width: 100%;
        }

        /* Theme Toggle */
        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid #ddd;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-color);
            transition: all 0.3s;
            width: auto;
            margin-top: 0;
            white-space: nowrap;
        }

        .theme-toggle:hover {
            border-color: var(--quest-border);
            background: var(--quest-bg);
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 15px;
        }

        button {
            background: var(--btn-bg);
            color: white;
            border: none;
            padding: 15px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            font-size: 18px;
        }

        .pass {
            background: var(--pass-bg);
            border: 2px solid var(--pass-border);
            color: var(--pass-text);
        }

        .fail {
            background: var(--fail-bg);
            border: 2px solid var(--fail-border);
            color: var(--fail-text);
        }

        .submit-area {
            margin-top: 15px;
            padding: 15px;
            border-top: 1px dashed #ccc;
            text-align: center;
        }

        input[type="text"] {
            font-size: 18px;
            padding: 10px;
            width: 60%;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #3498db;
            text-decoration: none;
            font-size: 16px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="quest-panel">
            <div class="header-area">
                <h1 style="margin: 0; font-size: 24px;">{{ ex.title }}</h1>
                <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
                    <span id="theme-icon">🌙</span>
                    <span id="theme-text">深色模式</span>
                </button>
            </div>
            <div class="quest">{{ ex.quest_html | safe }}</div>
        </div>

        <div class="code-panel">
            <textarea id="python-code">{{ ex.starter_code }}</textarea>

            <button onclick="checkCode()">🏃‍♀️‍➡️ 跑看看 🏃‍♀️</button>

            <div style="margin-top: 10px; font-size: 13px; color: #666; text-align: center;">
                ⚠️ 如果程式執行過久（不小心寫了無限迴圈），瀏覽器當掉，請重開網頁。
            </div>

            <div id="result"></div>
        </div>
    </div>

    <script id="test-code" type="application/json">{{ test_code_json | safe }}</script>
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <script>
        class CodeSnippet extends HTMLElement {
            constructor() {
                super();
                this.attachShadow({ mode: 'open' });
            }

            connectedCallback() {
                // Grab the text inside the tag before we overwrite the innerHTML
                const codeText = this.innerHTML.trim();
                this.render(codeText);
            }

            render(content) {
                this.shadowRoot.innerHTML = `
        <style>
            :host { 
                display: block; 
                margin: 1.5rem 0; 
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }
            .wrapper {
                position: relative;
                background: #1e1e1e;
                color: #d4d4d4;
                padding: 1.2rem;
                border-radius: 8px;
                border: 1px solid #333;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            }
            pre { 
                margin: 0; 
                white-space: pre-wrap; 
                word-break: break-all; 
                font-family: 'Consolas', 'Monaco', monospace;
                font-size: 14px; 
                line-height: 1.5;
            }
            .copy-btn {
                position: absolute; 
                top: 8px; 
                right: 8px;
                background: #333; 
                border: 1px solid #444; 
                color: #ececec;
                padding: 4px 10px; 
                border-radius: 4px; 
                cursor: pointer;
                font-size: 11px;
                font-weight: bold;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                transition: all 0.2s ease;
                min-width: 60px; /* Prevents button jumping when text changes */
                text-align: center;
            }
            .copy-btn:hover { 
                background: #444; 
                border-color: #666;
            }
            .copy-btn.success { 
                background: #059669; 
                color: white; 
                border-color: #059669;
            }
            /* Hide in embed mode */
            :host-context(body.embed-mode) .copy-btn {
                display: none;
            }
        </style>
        
        <div class="wrapper">
            <button class="copy-btn">Copy</button>
            <pre>${content}</pre>
        </div>
        `;

                this.setupLogic();
            }

            setupLogic() {
                const btn = this.shadowRoot.querySelector('.copy-btn');
                const code = this.shadowRoot.querySelector('pre').innerText;

                btn.addEventListener('click', () => {
                    navigator.clipboard.writeText(code).then(() => {
                        // UI Feedback
                        btn.innerText = 'Copied!';
                        btn.classList.add('success');

                        // Revert after 2 seconds
                        setTimeout(() => {
                            btn.innerText = 'Copy';
                            btn.classList.remove('success');
                        }, 2000);
                    }).catch(err => {
                        console.error('Failed to copy: ', err);
                        btn.innerText = 'Error';
                    });
                });
            }
        }

        // Register the custom tag
        customElements.define('code-snippet', CodeSnippet);
    </script>

    <script>
        function updateThemeUI(isDark) {
            const btn = document.getElementById('theme-btn');
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');

            if (isDark) {
                document.body.classList.add('dark-mode');
                icon.innerText = '☀️';
                text.innerText = '淺色模式';
                if (window.editor) window.editor.setOption('theme', 'pastel-on-dark');
            } else {
                document.body.classList.remove('dark-mode');
                icon.innerText = '🌙';
                text.innerText = '深色模式';
                if (window.editor) window.editor.setOption('theme', 'default');
            }
        }

        function toggleTheme() {
            const isDark = !document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeUI(isDark);
        }

        // Initial theme check
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
        }

        // Check for embed mode
        if (new URLSearchParams(window.location.search).get('embed') === 'true') {
            document.body.classList.add('embed-mode');

            // Re-calculate size after the frame is fully loaded
            window.addEventListener('load', () => {
                setTimeout(() => { if (window.editor) editor.refresh() }, 200);
            });
        }

        var editor = CodeMirror.fromTextArea(document.getElementById("python-code"), {
            mode: "python",
            lineNumbers: true,
            indentUnit: 4,
            theme: savedTheme === 'dark' ? "pastel-on-dark" : "default",
            styleActiveLine: true,
            extraKeys: {
                "Cmd-/": "toggleComment",
                "Ctrl-/": "toggleComment",
                "Alt-Up": "swapLineUp",
                "Alt-Down": "swapLineDown",
                "Shift-Alt-Up": "duplicateLine",
                "Shift-Alt-Down": "duplicateLine"
            }
        });

        // Ensure the UI button matches the initial state
        window.addEventListener('DOMContentLoaded', () => {
            updateThemeUI(savedTheme === 'dark');
        });

        let pyodideInstance = null;

        async function checkCode() {
            const resultDiv = document.getElementById("result");
            resultDiv.style.display = "block";
            resultDiv.className = "";
            resultDiv.innerHTML = "努力跑跑中...";

            try {
                if (!pyodideInstance) pyodideInstance = await loadPyodide();
                const studentCode = editor.getValue();

                // Pass the Python test code safely using Jinja2 JSON serialization
                const testCode = JSON.parse(document.getElementById("test-code").textContent);

                pyodideInstance.globals.set("studentCode", studentCode);
                pyodideInstance.globals.set("testCode", testCode);

                const executePythonScript = `
import sys
import json
import traceback

class CaptureOutput:
    def __init__(self):
        self.text = []
    def write(self, string):
        self.text.append(string)
    def flush(self):
        pass
    def get_value(self):
        return ''.join(self.text)

def _run_student_code():
    old_stdout = sys.stdout
    old_stderr = sys.stderr
    sys.stdout = CaptureOutput()
    sys.stderr = CaptureOutput()
    
    # Setup custom input() to use browser prompt
    import builtins
    original_input = builtins.input
    
    def custom_input(prompt=""):
        # Dynamically check for mock inputs in globals
        mocks = globals().get("_MOCK_INPUTS")
        if mocks and len(mocks) > 0:
            return str(mocks.pop(0))
        
        import js
        res = js.window.prompt(prompt)
        return str(res) if res is not None else ""
    
    # Inject custom input into both builtins and globals
    builtins.input = custom_input
    globals()["input"] = custom_input
    
    result = {"status": "SUCCESS", "message": "", "output": ""}
    
    user_output = ""
    try:
        # 1. 第一次執行：學生正式執行程式 (包含可能的 input 互動)
        exec(studentCode, globals())
        user_output = sys.stdout.get_value() + sys.stderr.get_value()
        
        # 2. 第二次執行：測試環節 (定義測試邏輯並跑測試)
        exec(testCode, globals())
        test_result = run_tests()
        
        if test_result != "SUCCESS":
            result["status"] = "FAILURE"
            result["message"] = test_result
            
    except Exception as e:
        result["status"] = "ERROR"
        result["message"] = traceback.format_exc()
        # 如果在測試之前就報錯，抓取當下的輸出
        user_output = sys.stdout.get_value() + sys.stderr.get_value()
    finally:
        # Restore original input just in case
        builtins.input = original_input
        
    result["output"] = user_output # 僅回傳第一次執行的輸出給前端
    
    sys.stdout = old_stdout
    sys.stderr = old_stderr
    return json.dumps(result)

_run_student_code()
`;

                const outputJson = await pyodideInstance.runPythonAsync(executePythonScript);
                const result = JSON.parse(outputJson);

                // Output formatting function
                const formatOutputSnippet = (outStr) => {
                    if (!outStr || outStr.trim() === "") return "";
                    const escapedOut = outStr.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    return `<div style="margin-top: 15px; padding: 10px; background: var(--result-output-bg); border-left: 4px solid #999; border-radius: 4px; font-family: monospace; font-size: 14px; white-space: pre-wrap;"><strong>Console 輸出：</strong><br>${escapedOut}</div>`;
                };

                if (result.status === "SUCCESS") {
                   resultDiv.className = "pass";
                   resultDiv.innerHTML = `
                   🎊 <strong>太棒了！挑戰成功！</strong>
                   ${formatOutputSnippet(result.output)}
                   <div class="submit-area" style="text-align: left; max-width: 300px; margin: 0 auto; margin-top: 15px;">
                       <p style="text-align: center;">請填寫資料以登記成績：</p>
                       <label>學號：</label><br>
                       <input type="text" id="stuID" placeholder="請輸入學號" style="width: 100%; margin-bottom: 10px;"><br>
                       <label>姓名：</label><br>
                       <input type="text" id="stuName" placeholder="請輸入姓名" style="width: 100%;"><br>
                       <button onclick="sendData()" style="width:100%; padding:10px; background:#3498db; margin-top:15px; color: white; border: none; cursor: pointer;">登記成績</button>
                   </div>
                `;
                } else if (result.status === "FAILURE") {
                   resultDiv.className = "fail";
                   resultDiv.innerHTML = `💡 <strong>答案不正確：</strong><br> <div style="white-space: pre-wrap; font-size: 14px; background: var(--result-output-bg); color: var(--text-color); padding: 10px; border-radius: 4px; margin-top: 5px;">${result.message}</div> ${formatOutputSnippet(result.output)}`;
                } else {
                   resultDiv.className = "fail";
                   resultDiv.innerHTML = `🚨 <strong>程式執行發生錯誤：</strong><br><pre style="white-space: pre-wrap; font-size: 14px; background: var(--result-output-bg); color: var(--text-color); padding: 10px; border-radius: 4px;">${result.message}</pre> ${formatOutputSnippet(result.output)}`;
                }

                // Scroll result into view without aggressive jumping
                resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

                } catch (err) {
                // Catch any unexpected syntax or JS/Pyodide crashes that would otherwise silently hang the UI
                resultDiv.className = "fail";
                resultDiv.innerHTML = `🚨 <strong>測試環境發生嚴重錯誤（可能為語法錯誤）：</strong><br><pre style="white-space: pre-wrap; font-size: 14px; background: var(--result-output-bg); color: var(--text-color); padding: 10px; border-radius: 4px;">${err.message}</pre>`;
                }        }

        async function sendData() {
            const id = document.getElementById("stuID").value;
            const name = document.getElementById("stuName").value;
            const exerciseNum = "{{ ex.id }}";

            if (!id || !name) {
                alert("請完整填寫學號與姓名喔！");
                return;
            }

            const btn = document.querySelector(".submit-area button");
            const originalBtnText = btn.innerText;

            btn.disabled = true;
            btn.innerText = "正在傳送中...";
            btn.style.backgroundColor = "#ccc";

            const gasURL = "{{ gas_url }}";

            try {
                // 改用 GET 請求以避開 CORS 限制
                const queryParams = new URLSearchParams({
                    stuID: id,
                    stuName: name,
                    exID: exerciseNum
                });

                const response = await fetch(`${gasURL}?${queryParams.toString()}`, {
                    method: 'GET',
                    mode: 'cors'
                });

                if (!response.ok) throw new Error("網路連線異常 (" + response.status + ")");

                const result = await response.json();

                if (result.status === "success") {
                    alert(name + " 同學，第 " + exerciseNum + " 題的成績已成功傳送！");
                    document.querySelector(".submit-area").innerHTML = "✅ 成績已成功登記在表單中。";
                } else {
                    let errorMsg = "傳送失敗：";
                    if (result.code === 400) errorMsg += "欄位資料不正確 (400)，請檢查學號姓名格式。";
                    else errorMsg += (result.message || "Google 表單拒絕接收資料");
                    throw new Error(errorMsg);
                }

            } catch (err) {
                console.error("Submission Error:", err);
                btn.disabled = false;
                btn.innerText = originalBtnText;
                btn.style.backgroundColor = "#3498db";
                alert("⚠️ " + err.message + "\n請確認資料正確性與網路連線。");
            }
        }
    </script>

</body>

</html>
