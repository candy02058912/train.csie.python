<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python 學習進度繳交 - {{ ex.title }}</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

    <style>
        body {
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
            max-width: 1000px;
            margin: 40px auto;
            background-color: #f4f7f6;
            transition: all 0.3s;
        }

        /* Responsive 2-Column Layout */
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 25px;
            align-items: start;
        }

        @media (max-width: 850px) {
            .card {
                grid-template-columns: 1fr;
            }

            body {
                margin: 20px;
            }
        }

        .quest-panel,
        .code-panel {
            min-width: 0;
        }

        .quest-panel h1 {
            margin-top: 0;
            font-size: 24px;
        }

        .quest {
            background: #e8f4fd;
            padding: 15px;
            border-left: 5px solid #3498db;
            margin-bottom: 20px;
            font-size: 17px;
            line-height: 1.6;
        }

        /* Embed Mode Adjustments */
        body.embed-mode {
            margin: 0 !important;
            max-width: 100% !important;
            background: white;
            overflow: hidden;
            /* Prevent outer scrollbar */
            height: 100vh;
        }

        body.embed-mode .back-link,
        body.embed-mode .quest-panel h1 {
            display: none;
        }

        body.embed-mode .card {
            box-shadow: none;
            border-radius: 0;
            padding: 10px;
            padding-bottom: 60px;
            /* Extra space to prevent getting stuck at bottom */
            gap: 15px;
            height: 100vh;
            overflow-y: auto;
            grid-template-columns: 1fr 1.2fr;
            box-sizing: border-box;
        }

        body.embed-mode .quest {
            font-size: 14px;
            padding: 10px;
        }

        body.embed-mode .CodeMirror {
            height: 240px !important;
            /* Shorter for embed */
            font-size: 16px;
            /* Slightly smaller for embed */
        }

        body.embed-mode .CodeMirror-gutters {
            left: 0 !important;
        }

        body.embed-mode button {
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }

        .CodeMirror {
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 18px;
            height: 500px;
            /* Approximately 25 lines */
            width: 100%;
        }


        button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-weight: bold;
        }

        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            font-size: 18px;
        }

        .pass {
            background: #d4edda;
            border: 2px solid #c3e6cb;
        }

        .fail {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
        }

        .submit-area {
            margin-top: 15px;
            padding: 15px;
            border-top: 1px dashed #ccc;
            text-align: center;
        }

        input[type="text"] {
            font-size: 18px;
            padding: 10px;
            width: 60%;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #3498db;
            text-decoration: none;
            font-size: 16px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="quest-panel">
            <h1>{{ ex.title }}</h1>
            <div class="quest">{{ ex.quest_html | safe }}</div>
        </div>

        <div class="code-panel">
            <textarea id="python-code">{{ ex.starter_code }}</textarea>

            <button onclick="checkCode()">🏃‍♀️‍➡️ 跑看看 🏃‍♀️</button>

            <div style="margin-top: 10px; font-size: 13px; color: #666; text-align: center;">
                ⚠️ 如果程式執行過久（不小心寫了無限迴圈），瀏覽器當掉，請重開網頁。
            </div>

            <div id="result"></div>
        </div>
    </div>

    <script id="test-code" type="application/json">{{ test_code_json | safe }}</script>
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <script>
        class CodeSnippet extends HTMLElement {
            constructor() {
                super();
                this.attachShadow({ mode: 'open' });
            }

            connectedCallback() {
                // Grab the text inside the tag before we overwrite the innerHTML
                const codeText = this.innerHTML.trim();
                this.render(codeText);
            }

            render(content) {
                this.shadowRoot.innerHTML = `
        <style>
            :host { 
                display: block; 
                margin: 1.5rem 0; 
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }
            .wrapper {
                position: relative;
                background: #1e1e1e;
                color: #d4d4d4;
                padding: 1.2rem;
                border-radius: 8px;
                border: 1px solid #333;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            }
            pre { 
                margin: 0; 
                white-space: pre-wrap; 
                word-break: break-all; 
                font-family: 'Consolas', 'Monaco', monospace;
                font-size: 14px; 
                line-height: 1.5;
            }
            .copy-btn {
                position: absolute; 
                top: 8px; 
                right: 8px;
                background: #333; 
                border: 1px solid #444; 
                color: #ececec;
                padding: 4px 10px; 
                border-radius: 4px; 
                cursor: pointer;
                font-size: 11px;
                font-weight: bold;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                transition: all 0.2s ease;
                min-width: 60px; /* Prevents button jumping when text changes */
                text-align: center;
            }
            .copy-btn:hover { 
                background: #444; 
                border-color: #666;
            }
            .copy-btn.success { 
                background: #059669; 
                color: white; 
                border-color: #059669;
            }
            /* Hide in embed mode */
            :host-context(body.embed-mode) .copy-btn {
                display: none;
            }
        </style>
        
        <div class="wrapper">
            <button class="copy-btn">Copy</button>
            <pre>${content}</pre>
        </div>
        `;

                this.setupLogic();
            }

            setupLogic() {
                const btn = this.shadowRoot.querySelector('.copy-btn');
                const code = this.shadowRoot.querySelector('pre').innerText;

                btn.addEventListener('click', () => {
                    navigator.clipboard.writeText(code).then(() => {
                        // UI Feedback
                        btn.innerText = 'Copied!';
                        btn.classList.add('success');

                        // Revert after 2 seconds
                        setTimeout(() => {
                            btn.innerText = 'Copy';
                            btn.classList.remove('success');
                        }, 2000);
                    }).catch(err => {
                        console.error('Failed to copy: ', err);
                        btn.innerText = 'Error';
                    });
                });
            }
        }

        // Register the custom tag
        customElements.define('code-snippet', CodeSnippet);
    </script>

    <script>
        // Check for embed mode
        if (new URLSearchParams(window.location.search).get('embed') === 'true') {
            document.body.classList.add('embed-mode');

            // Re-calculate size after the frame is fully loaded
            window.addEventListener('load', () => {
                setTimeout(() => editor.refresh(), 200);
            });
        }

        var editor = CodeMirror.fromTextArea(document.getElementById("python-code"), {
            mode: "python", lineNumbers: true, indentUnit: 4
        });

        let pyodideInstance = null;

        async function checkCode() {
            const resultDiv = document.getElementById("result");
            resultDiv.style.display = "block";
            resultDiv.className = "";
            resultDiv.innerHTML = "努力跑跑中...";

            try {
                if (!pyodideInstance) pyodideInstance = await loadPyodide();
                const studentCode = editor.getValue();

                // Pass the Python test code safely using Jinja2 JSON serialization
                const testCode = JSON.parse(document.getElementById("test-code").textContent);

                pyodideInstance.globals.set("studentCode", studentCode);
                pyodideInstance.globals.set("testCode", testCode);

                const executePythonScript = `
import sys
import json
import traceback

class CaptureOutput:
    def __init__(self):
        self.text = []
    def write(self, string):
        self.text.append(string)
    def flush(self):
        pass
    def get_value(self):
        return ''.join(self.text)

def _run_student_code():
    old_stdout = sys.stdout
    old_stderr = sys.stderr
    sys.stdout = CaptureOutput()
    sys.stderr = CaptureOutput()
    
    result = {"status": "SUCCESS", "message": "", "output": ""}
    
    try:
        # Evaluate student code then test asserts in the global context
        exec(studentCode, globals())
        exec(testCode, globals())
        test_result = run_tests()
        if test_result != "SUCCESS":
            result["status"] = "FAILURE"
            result["message"] = test_result
    except Exception as e:
        result["status"] = "ERROR"
        result["message"] = traceback.format_exc()
        
    result["output"] = sys.stdout.get_value() + sys.stderr.get_value()
    
    sys.stdout = old_stdout
    sys.stderr = old_stderr
    return json.dumps(result)

_run_student_code()
`;

                const outputJson = await pyodideInstance.runPythonAsync(executePythonScript);
                const result = JSON.parse(outputJson);

                // Output formatting function
                const formatOutputSnippet = (outStr) => {
                    if (!outStr || outStr.trim() === "") return "";
                    const escapedOut = outStr.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    return `<div style="margin-top: 15px; padding: 10px; background: #fdfdfd; border-left: 4px solid #999; border-radius: 4px; font-family: monospace; font-size: 14px; white-space: pre-wrap;"><strong>Console 輸出：</strong><br>${escapedOut}</div>`;
                };

                if (result.status === "SUCCESS") {
                    resultDiv.className = "pass";
                    resultDiv.innerHTML = `
                    🎊 <strong>太棒了！挑戰成功！</strong>
                    ${formatOutputSnippet(result.output)}
                    <div class="submit-area" style="text-align: left; max-width: 300px; margin: 0 auto; margin-top: 15px;">
                        <p style="text-align: center;">請填寫資料以登記成績：</p>
                        <label>學號：</label><br>
                        <input type="text" id="stuID" placeholder="請輸入學號" style="width: 100%; margin-bottom: 10px;"><br>
                        <label>姓名：</label><br>
                        <input type="text" id="stuName" placeholder="請輸入姓名" style="width: 100%;"><br>
                        <button onclick="sendData()" style="width:100%; padding:10px; background:#3498db; margin-top:15px; color: white; border: none; cursor: pointer;">登記成績</button>
                    </div>
                `;
                } else if (result.status === "FAILURE") {
                    resultDiv.className = "fail";
                    resultDiv.innerHTML = `💡 <strong>答案不正確：</strong><br> <div style="white-space: pre-wrap; font-size: 14px; background: #fff; padding: 10px; border-radius: 4px; margin-top: 5px;">${result.message}</div> ${formatOutputSnippet(result.output)}`;
                } else {
                    resultDiv.className = "fail";
                    resultDiv.innerHTML = `🚨 <strong>程式執行發生錯誤：</strong><br><pre style="white-space: pre-wrap; font-size: 14px; background: #fff; padding: 10px; border-radius: 4px;">${result.message}</pre> ${formatOutputSnippet(result.output)}`;
                }

                // Scroll result into view without aggressive jumping
                resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            } catch (err) {
                // Catch any unexpected syntax or JS/Pyodide crashes that would otherwise silently hang the UI
                resultDiv.className = "fail";
                resultDiv.innerHTML = `🚨 <strong>測試環境發生嚴重錯誤（可能為語法錯誤）：</strong><br><pre style="white-space: pre-wrap; font-size: 14px; background: #fff; padding: 10px; border-radius: 4px;">${err.message}</pre>`;
            }
        }

        async function sendData() {
            const id = document.getElementById("stuID").value;
            const name = document.getElementById("stuName").value;
            const exerciseNum = "{{ ex.id }}";

            if (!id || !name) {
                alert("請完整填寫學號與姓名喔！");
                return;
            }

            const btn = document.querySelector(".submit-area button");
            const originalBtnText = btn.innerText;

            btn.disabled = true;
            btn.innerText = "正在傳送中...";
            btn.style.backgroundColor = "#ccc";

            const gasURL = "{{ gas_url }}";

            try {
                // 改用 GET 請求以避開 CORS 限制
                const queryParams = new URLSearchParams({
                    stuID: id,
                    stuName: name,
                    exID: exerciseNum
                });

                const response = await fetch(`${gasURL}?${queryParams.toString()}`, {
                    method: 'GET',
                    mode: 'cors'
                });

                if (!response.ok) throw new Error("網路連線異常 (" + response.status + ")");

                const result = await response.json();

                if (result.status === "success") {
                    alert(name + " 同學，第 " + exerciseNum + " 題的成績已成功傳送！");
                    document.querySelector(".submit-area").innerHTML = "✅ 成績已成功登記在表單中。";
                } else {
                    let errorMsg = "傳送失敗：";
                    if (result.code === 400) errorMsg += "欄位資料不正確 (400)，請檢查學號姓名格式。";
                    else errorMsg += (result.message || "Google 表單拒絕接收資料");
                    throw new Error(errorMsg);
                }

            } catch (err) {
                console.error("Submission Error:", err);
                btn.disabled = false;
                btn.innerText = originalBtnText;
                btn.style.backgroundColor = "#3498db";
                alert("⚠️ " + err.message + "\n請確認資料正確性與網路連線。");
            }
        }
    </script>

</body>

</html>
